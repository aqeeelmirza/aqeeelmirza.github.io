  <title>Research Trajectory</title>
  <style>
    .trajectory-wrap {
      max-width: 1000px;
      margin: 0 auto;
      background: #12141A;
      border-radius: 18px;
      border: 1px solid #333B49;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    .trajectory-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .cname {
      fill: #E8E6DD;
      font: 600 15px/1.2 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .csub {
      fill: #9AA3B2;
      font: 400 12.5px/1.2 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .leg {
      fill: none;
      stroke: #5DCAA5;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: draw 0.9s ease forwards;
    }
    .city {
      opacity: 0;
      animation: fade .5s ease forwards;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes fade { to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .leg { animation: none; stroke-dashoffset: 0; }
      .city { animation: none; opacity: 1; }
    }
  </style>
