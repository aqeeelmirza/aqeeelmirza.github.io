<script>
(function(){
  var started = false;
  function start(){
    if (started) return;
    started = true;
    document.body.classList.add('playing');
    // Verona pulse begins once the last leg has finished drawing
    setTimeout(function(){
      ['pulseR','pulseO'].forEach(function(id){
        var el = document.getElementById(id);
        if (el && el.beginElement) { try { el.beginElement(); } catch(e){} }
      });
    }, 7500);
  }
  // Parent page signals when the map scrolls into view
  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'startTrajectory') start();
  });
  // Fallback: opened directly (not inside an iframe) — animate on its own
  if (window.self === window.top) setTimeout(start, 400);
})();
</script>
