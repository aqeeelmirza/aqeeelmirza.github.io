<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muhammad Aqeel</title>
  <link rel="icon" type="image/svg+xml" href="spubs/favicon.svg">
  <meta name="description" content="Postdoctoral Research Fellow at the University of Verona working on unsupervised anomaly detection for industrial inspection.">
  <meta property="og:title" content="Muhammad Aqeel">
  <meta property="og:description" content="Postdoctoral Research Fellow at the University of Verona working on unsupervised anomaly detection for industrial inspection.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="PPP.JPG">
  <link rel="stylesheet" href="styles.css">
  <script>
    // Follow system preference automatically
    (function(){
      try {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function apply(){ document.documentElement.setAttribute('data-theme', mq.matches ? 'dark' : 'light'); }
        apply();
        mq.addEventListener ? mq.addEventListener('change', apply) : mq.addListener(apply);
      } catch(_){}
    })();
  </script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav>
    <div class="nav-container">
      <button class="nav-brand" data-page="home">Muhammad Aqeel</button>
      <div class="nav-right">
        <ul class="nav-menu" id="navMenu">
          <li><button class="nav-link active" data-page="home">Home</button></li>
          <li><button class="nav-link" data-page="news">News</button></li>
          <li><button class="nav-link" data-page="publications">Publications</button></li>
          <li><button class="nav-link" data-page="grants">Grants</button></li>
          <li><button class="nav-link" data-page="career">Career</button></li>
        </ul>
        <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <main id="main-content" tabindex="-1">

    <!-- HOME -->
    <div class="page-section active" id="page-home" data-screen-label="Home">
      <div class="header"></div>
      <div class="bio"></div>

      <section class="content-section">
        <h2 class="section-title">News</h2>
        <div class="news-list" id="homeNews"></div>
      </section>

      <section class="content-section">
        <h2 class="section-title">Selected publications</h2>
        <div id="homeSelectedPubs"></div>
      </section>

    </div>

    <!-- NEWS -->
    <div class="page-section" id="page-news" data-screen-label="News">
      <h1 class="page-title">News</h1>
      <p class="page-intro">A timeline of recent updates, paper acceptances, talks, and milestones.</p>
      <div id="newsPageBody"></div>
    </div>

    <!-- PUBLICATIONS -->
    <div class="page-section" id="page-publications" data-screen-label="Publications">
      <h1 class="page-title">Publications</h1>
      <p class="page-intro">See also <a href="https://scholar.google.com/citations?user=ZPUihX0AAAAJ&amp;hl=en" target="_blank" rel="noopener">Google Scholar</a> for citation metrics.</p>
      <div class="pub-filters">
        <button class="pub-filter-btn active" data-filter="all">All publications</button>
        <button class="pub-filter-btn" data-filter="featured">Selected</button>
      </div>
      <div id="publicationsList"></div>
    </div>

    <!-- GRANTS -->
    <div class="page-section" id="page-grants" data-screen-label="Grants">
      <h1 class="page-title">Grants</h1>
      <p class="page-intro">Funded research projects and scholarships.</p>
      <div id="grantsList"></div>
    </div>

    <!-- CAREER -->
    <div class="page-section" id="page-career" data-screen-label="Career">
      <h1 class="page-title">Career</h1>
      <h2 class="career-subsection-title">Education</h2>
      <div id="educationList"></div>
      <h2 class="career-subsection-title">Experience</h2>
      <div id="experienceList"></div>
      <div id="talksWrap"></div>
      <div id="serviceWrap"></div>
      <div id="menteesWrap"></div>
    </div>

  </main>

  <footer>
    <p>© 2026 Muhammad Aqeel</p>
  </footer>

  <!-- BibTeX modal -->
  <div class="modal-backdrop" id="bibtexBackdrop" role="dialog" aria-modal="true" aria-labelledby="bibtexTitle">
    <div class="modal" id="bibtexModal" data-bibtex="">
      <h3 id="bibtexTitle"></h3>
      <pre></pre>
      <div class="modal-actions">
        <button class="btn" id="bibtexCloseBtn">Close</button>
        <button class="btn btn-primary" id="bibtexCopyBtn">Copy</button>
      </div>
    </div>
  </div>

  <script src="site.js"></script>
</body>
</html>
